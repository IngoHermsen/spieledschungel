<div (click)="stopPropagation($event)" translate="no" class="media-controls">
    <span>
        <img class="toggle-img icon" src="assets/music/music.svg" alt="music-on-button">
    </span>
    <div class="controls--replay--pause">
        <span (click)="audioService.restartAudio()" class="button material-icons-round">replay</span>
        @if(audioService.isPlaying()) {
        <div (click)="audioService.togglePlay()" class="button material-icons-round">pause_circle</div>
        }
        @if(!audioService.isPlaying()) {
        <div (click)="audioService.togglePlay()" class="button material-icons-round">play_circle</div>
        }

    </div>
</div>
